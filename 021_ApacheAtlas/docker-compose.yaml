services:
  # sburn/apache-atlas is an all-in-one image (embedded HBase/Solr/Kafka/ZooKeeper).
  # No external zookeeper is needed; the default CMD runs atlas_start.py automatically.
  atlas:
    image: sburn/apache-atlas
    hostname: atlas
    container_name: atlas
    ports:
      - "21000:21000"
    networks:
      - atlas-network
    healthcheck:
      test: nc -z localhost 21000 || exit -1
      # Atlas takes a few minutes to boot; don't mark unhealthy during startup.
      start_period: 300s
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  atlas-network:
    driver: bridge
