version: '3.8'
services:
  zookeeper:
    image: zookeeper:3.9.2
    hostname: zookeeper
    container_name: zookeeper
    restart: always
    networks:
      - storm-network
    expose:
      - "2181"
    ports:
      - "2181:2181"
    environment:
      # The official zookeeper image uses ZOO_* env vars; allow the ruok 4-letter word for healthcheck.
      ZOO_4LW_COMMANDS_WHITELIST: ruok
    healthcheck:
      # Proper request/response probe; avoids the benign "probably closed the socket" INFO noise from nc -z.
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 3

  nimbus:
    # nimbus is master node of storm.
    # nimbus assigns a task to supervisor.
    image: storm:2.7.0
    hostname: nimbus
    container_name: nimbus
    command: storm nimbus
    restart: always
    expose:
      - "6627"
      - "8080"
    ports:
      - "6627:6627"
      - "8080:8080"
    networks:
      - storm-network
    healthcheck:
      test: ["CMD", "storm", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      zookeeper:
        condition: service_healthy

  supervisor:
    # supervisor is worker node of storm.
    image: storm:2.7.0
    hostname: supervisor
    container_name: supervisor
    command: storm supervisor
    restart: always
    networks:
      - storm-network
    healthcheck:
      test: ["CMD", "storm", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      zookeeper:
        condition: service_healthy
      nimbus:
        condition: service_healthy

networks:
  storm-network:
    driver: bridge
